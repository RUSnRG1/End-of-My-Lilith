<!DOCTYPE html>
<html lang="ja">
    <head>
        <script>
            // ローカル環境と本番環境を判定して <base> タグを動的に設定
            (function() {
                var baseTag = document.createElement("base");
                
                // hostname でローカル環境か本番環境かを判定
                if (location.hostname === "127.0.0.1" || location.hostname === "localhost") {
                    // ローカル環境: Live Serverなど
                    baseTag.href = "/";
                } else {
                    // 本番環境: GitHub Pagesのパス
                    baseTag.href = "/End-of-My-Lilith/";
                }
    
                // <head> に <base> タグを挿入
                document.head.appendChild(baseTag);
            })();
        </script>
        <meta charset="UTF-8">
        <meta name="auther" content="鈴羅木れう">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>End of My Lilith</title><!--タイトル入れる。タブに表示される-->
        <link rel="stylesheet" href="./style.css">
        <script src="./script.js"></script>
    </head>
    <body class="about-page">
        <div id="container">
            <div class="slider-placeholder"></div>
            <div class="contentlink-placeholder"></div>
            <main class="about">
                <section class="about-card">
                    <div class="about-card__text">
                        <h1 class="about-card__title">End of My Lilith</h1>
                        <p>鈴羅木れうによる個人サークルです。</p>

                        <p>小説、漫画、イラスト、コスプレ（やるのも衣装作りも撮影も）。つまり何でも作ります。</p>
                    </div>
                    <figure class="about-card__image-wrap about-card__image-wrap--circle">
                        <img src="images/About_Circle.png" alt="End of My Lilith のサークルイメージ">
                    </figure>

                <section class="about-card about-card--reverse">
                    <figure class="about-card__image-wrap">

                        <p>最近は社会人のコスプレに励んでます。</p>

                    </div>
                </section>
            </main>
            
        </div>  
        <div class="footer-placeholder"></div>

    </body>
</html>
